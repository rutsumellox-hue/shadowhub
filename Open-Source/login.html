<!DOCTYPE html>
<html lang="fr" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CyberHub // Connexion</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@600;700;800&display=swap');

    :root {
      --red: #ff2d55;
      --green: #00ff88;
    }

    body {
      background: #070709;
      font-family: 'Inter', system-ui, sans-serif;
      color: #e4e4e7;
    }

    .mono {
      font-family: 'JetBrains Mono', monospace;
    }

    .bg-grid {
      background-image: linear-gradient(rgba(255, 45, 85, .04) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 45, 85, .04) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .panel {
      background: #0d0d11;
      border: 1px solid #1e1e28;
      border-radius: 12px;
    }

    .inp {
      width: 100%;
      background: #070709;
      border: 1px solid #1e1e28;
      border-radius: 8px;
      padding: 12px 16px;
      color: #e4e4e7;
      font-size: .9rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    .inp:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 2px rgba(255, 45, 85, .15);
    }

    .inp::placeholder {
      color: #52525b;
    }

    .btn-main {
      width: 100%;
      background: linear-gradient(135deg, #be0000, var(--red));
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      border-radius: 8px;
      padding: 13px;
      border: none;
      cursor: pointer;
      transition: all .2s;
      box-shadow: 0 0 20px rgba(255, 45, 85, .25);
      letter-spacing: .01em;
    }

    .btn-main:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 32px rgba(255, 45, 85, .5);
    }

    .scanlines {
      pointer-events: none;
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, .06) 2px, rgba(0, 0, 0, .06) 4px);
      z-index: 999;
    }

    .err {
      background: rgba(255, 45, 85, .1);
      border: 1px solid rgba(255, 45, 85, .3);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--red);
      font-size: .8rem;
      display: none;
    }

    label {
      display: block;
      font-size: .75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #71717a;
      margin-bottom: 6px;
      font-family: 'JetBrains Mono', monospace;
    }
  </style>
</head>

<body class="bg-grid min-h-screen flex items-center justify-center px-4 py-12">
  <div class="scanlines"></div>

  <div style="width:100%;max-width:420px">

    <!-- Logo -->
    <div class="text-center mb-8">
      <a href="cyberhub.html"
        class="inline-flex items-center gap-2 text-zinc-500 text-xs mono hover:text-zinc-300 transition mb-6">
        <i class="fa-solid fa-arrow-left"></i> Retour CyberHub
      </a>
      <div class="flex justify-center items-center gap-2 mb-2">
        <i class="fa-solid fa-microchip text-2xl" style="color:var(--red);filter:drop-shadow(0 0 8px var(--red))"></i>
        <span class="text-xl font-bold" style="font-family:'Space Grotesk',sans-serif">Cyber<span
            style="color:var(--red)">Hub</span></span>
      </div>
      <div class="mono text-xs text-zinc-600">TERMINAL D'AUTHENTIFICATION</div>
    </div>

    <!-- Panel -->
    <div class="panel p-8">
      <div id="errMsg" class="err mb-5"><i class="fa-solid fa-triangle-exclamation mr-2"></i><span id="errTxt"></span>
      </div>

      <div class="space-y-5">
        <div>
          <label>Email</label>
          <div class="relative">
            <i class="fa-solid fa-envelope absolute left-3.5 top-1/2 -translate-y-1/2 text-zinc-600 text-sm"></i>
            <input id="email" type="email" placeholder="user@domain.com" class="inp pl-10" autocomplete="email" />
          </div>
        </div>
        <div>
          <label>Mot de passe</label>
          <div class="relative">
            <i class="fa-solid fa-lock absolute left-3.5 top-1/2 -translate-y-1/2 text-zinc-600 text-sm"></i>
            <input id="password" type="password" placeholder="••••••••" class="inp pl-10"
              autocomplete="current-password" />
            <button type="button" id="togglePwd"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-600 hover:text-zinc-300 transition text-sm"><i
                class="fa-regular fa-eye"></i></button>
          </div>
        </div>
        <button id="loginBtn" class="btn-main mt-2"><i class="fa-solid fa-right-to-bracket mr-2"></i>Se
          connecter</button>
      </div>

      <div class="mt-6 pt-6 border-t border-zinc-800 space-y-3 text-center text-sm text-zinc-500">
        <p>Pas de compte ? <a href="signup.html" style="color:var(--red)" class="hover:underline font-medium">Créer un
            compte</a></p>
        <p class="text-xs"><a href="shadow-gate.html" class="text-zinc-700 hover:text-zinc-500 transition mono">Accès
            Shadow (double auth)</a></p>
      </div>
    </div>

    <div class="mt-6 panel p-4 mono text-xs text-zinc-600 text-center">
      Session chiffrée · TLS 1.3 · Aucune donnée transmise
    </div>
  </div>

  <script>
    const loginBtn = document.getElementById('loginBtn');
    const errMsg = document.getElementById('errMsg');
    const errTxt = document.getElementById('errTxt');
    const togglePwd = document.getElementById('togglePwd');
    const pwdInput = document.getElementById('password');

    togglePwd.addEventListener('click', () => {
      const show = pwdInput.type === 'password';
      pwdInput.type = show ? 'text' : 'password';
      togglePwd.innerHTML = show ? '<i class="fa-regular fa-eye-slash"></i>' : '<i class="fa-regular fa-eye"></i>';
    });

    loginBtn.addEventListener('click', () => {
      const email = document.getElementById('email').value.trim();
      const pwd = document.getElementById('password').value;
      if (!email || !pwd) { showErr('Veuillez remplir tous les champs.'); return; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showErr('Email invalide.'); return; }
      loginBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>Connexion...';
      loginBtn.disabled = true;
      setTimeout(() => {
        localStorage.setItem('cyberhub_user', email);
        localStorage.setItem('cyberhub_username', email.split('@')[0]);
        window.location.href = 'dashboard.html';
      }, 900);
    });

    document.addEventListener('keydown', e => { if (e.key === 'Enter') loginBtn.click(); });

    function showErr(msg) {
      errTxt.textContent = msg;
      errMsg.style.display = 'block';
      setTimeout(() => errMsg.style.display = 'none', 4000);
    }

    // Déjà connecté → redirect
    if (localStorage.getItem('cyberhub_user')) window.location.href = 'dashboard.html';
  </script>
</body>

</html>
