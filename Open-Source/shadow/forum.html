<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShadowHub // Forum</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="data/css/style.css"/>
</head>
<body class="bg-[#070709] text-zinc-200 text-sm min-h-screen flex flex-col scanlines">

<div class="top-bar">
  <span class="live flex items-center gap-1.5"><span class="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse"></span>FORUM LIVE</span>
  <span class="text-zinc-700 mono" id="onlineBadge"></span>
  <div class="ml-auto flex items-center gap-4">
    <span class="mono text-zinc-600" id="topUser"></span>
    <a href="../cyberhub.html" onclick="localStorage.removeItem('cyberhub_user')" class="text-red-500 hover:underline">Quitter</a>
  </div>
</div>

<div style="padding-top:32px" class="flex flex-1">

  <!-- SIDEBAR -->
  <aside class="hidden lg:flex w-52 bg-[#08080a] border-r border-[#150505] py-5 px-2.5 flex-col gap-0.5">
    <div class="flex items-center gap-2 px-3 mb-5">
      <i class="fa-solid fa-skull-crossbones text-lg" style="color:#ff2d55;filter:drop-shadow(0 0 8px #ff2d55)"></i>
      <span class="font-black text-sm" style="font-family:'Space Grotesk',sans-serif">SHADOW<span style="color:#ff2d55">FORUM</span></span>
    </div>

    <a href="forum-pages/forum-general.html"       class="side-link"><i class="fa-solid fa-comments"></i> Général</a>
    <a href="forum-pages/forum-demandes.html"       class="side-link"><i class="fa-solid fa-circle-question"></i> Demandes</a>
    <a href="forum-pages/forum-aide.html"           class="side-link"><i class="fa-solid fa-life-ring"></i> Aide</a>
    <a href="forum-pages/forum-mirrors.html"        class="side-link"><i class="fa-solid fa-link"></i> Mirrors & Liens</a>
    <a href="forum-pages/forum-presentations.html"  class="side-link"><i class="fa-solid fa-user-plus"></i> Présentations</a>
    <a href="forum-pages/forum-commerces.html"      class="side-link"><i class="fa-solid fa-cart-shopping"></i> Commerces</a>
    <a href="forum-pages/forum-abonnements.html"    class="side-link"><i class="fa-solid fa-hand-holding-dollar"></i> Abonnements</a>
    <a href="forum-pages/forum-suivis.html"         class="side-link"><i class="fa-solid fa-star"></i> Suivis</a>
    <a href="forum-pages/forum-tchat.html"          class="side-link"><i class="fa-solid fa-message"></i> Chat Live</a>
    <div class="mt-3 pt-3 border-t border-zinc-900">
      <a href="index.html"  class="side-link"><i class="fa-solid fa-gauge"></i> Dashboard</a>
      <a href="compte.html" class="side-link"><i class="fa-solid fa-user"></i> Compte</a>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="flex-1 overflow-y-auto p-6 space-y-6">

    <!-- Header -->
    <div class="flex items-center justify-between flex-wrap gap-4">
      <div>
        <div class="mono text-xs text-zinc-600 mb-1">// SHADOWFORUM</div>
        <h1 class="text-2xl font-black" style="font-family:'Space Grotesk',sans-serif">Forum</h1>
      </div>
      <button onclick="showNewTopicModal()" class="danger-btn"><i class="fa-solid fa-plus mr-2"></i>Nouveau Sujet</button>
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <i class="ico fa-solid fa-search"></i>
      <input type="text" placeholder="Rechercher un sujet..." class="w-full max-w-md bg-[#0d0d11] border border-[#1e1e28] rounded-lg px-4 py-2.5 pl-10 text-sm outline-none" id="searchInput" oninput="filterPosts()"/>
    </div>

    <!-- Sections du forum -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="sectionsGrid">
      <!-- injected by JS -->
    </div>

    <!-- Posts récents -->
    <div>
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-bold" style="font-family:'Space Grotesk',sans-serif">Sujets récents</h2>
        <div class="flex gap-2">
          <button class="cat-btn active" onclick="filterTab('all',this)">Tous</button>
          <button class="cat-btn" onclick="filterTab('hot',this)">🔥 Hot</button>
          <button class="cat-btn" onclick="filterTab('new',this)">New</button>
        </div>
      </div>
      <div class="space-y-0" id="postsContainer"></div>
    </div>

  </main>
</div>

<!-- Modal Nouveau Sujet -->
<div id="newTopicModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
  <div class="widget p-6 w-full max-w-lg">
    <div class="flex items-center justify-between mb-5">
      <h3 class="font-bold text-base" style="font-family:'Space Grotesk',sans-serif">Nouveau Sujet</h3>
      <button onclick="closeModal()" class="text-zinc-600 hover:text-white text-lg"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="space-y-4">
      <div>
        <label class="block mono text-xs text-zinc-600 uppercase mb-1.5">Section</label>
        <select class="w-full bg-[#070709] border border-[#1e1e28] rounded-lg px-4 py-2.5 text-sm outline-none focus:border-red-500">
          <option>Général</option><option>Demandes</option><option>Aide / Support</option>
          <option>Mirrors & Liens</option><option>Présentations</option><option>Commerces</option>
        </select>
      </div>
      <div>
        <label class="block mono text-xs text-zinc-600 uppercase mb-1.5">Titre</label>
        <input id="newTopicTitle" type="text" class="w-full bg-[#070709] border border-[#1e1e28] rounded-lg px-4 py-2.5 text-sm outline-none focus:border-red-500" placeholder="Titre du sujet..."/>
      </div>
      <div>
        <label class="block mono text-xs text-zinc-600 uppercase mb-1.5">Message</label>
        <textarea id="newTopicBody" class="w-full bg-[#070709] border border-[#1e1e28] rounded-lg px-4 py-2.5 text-sm outline-none focus:border-red-500 resize-none" rows="5" placeholder="Contenu du sujet..."></textarea>
      </div>
      <div class="flex gap-3">
        <button onclick="postTopic()" class="danger-btn flex-1 py-2.5 text-center">Publier</button>
        <button onclick="closeModal()" class="flex-1 py-2.5 rounded-lg border border-zinc-700 text-zinc-400 hover:border-zinc-500 transition text-sm">Annuler</button>
      </div>
    </div>
  </div>
</div>

<script>
  if(!localStorage.getItem('shadow_authenticated')) window.location.href='../shadow-gate.html';
  const uname = localStorage.getItem('cyberhub_username') || (localStorage.getItem('cyberhub_user')||'Anonyme').split('@')[0];
  document.getElementById('topUser').textContent = uname;

  const online = 1240+Math.floor(Math.random()*20);
  document.getElementById('onlineBadge').textContent = online+' membres en ligne';

  // Sections
  const sections=[
    {icon:'fa-comments',label:'Général',desc:'Discussion libre',posts:234,tag:'Général',tagClass:'badge-zinc',href:'forum-pages/forum-general.html'},
    {icon:'fa-circle-question',label:'Demandes',desc:'Requêtes ressources',posts:89,tag:'Demandes',tagClass:'badge-amber',href:'forum-pages/forum-demandes.html'},
    {icon:'fa-life-ring',label:'Aide & Support',desc:'Entraide technique',posts:156,tag:'Support',tagClass:'badge-green',href:'forum-pages/forum-aide.html'},
    {icon:'fa-link',label:'Mirrors & Liens',desc:'Partage de liens',posts:72,tag:'Mirrors',tagClass:'badge-purple',href:'forum-pages/forum-mirrors.html'},
    {icon:'fa-cart-shopping',label:'Commerces',desc:'Échanges membres',posts:48,tag:'Commerce',tagClass:'badge-red',href:'forum-pages/forum-commerces.html'},
    {icon:'fa-message',label:'Chat Live',desc:'Discussion temps réel',posts:1200,tag:'Live',tagClass:'badge-red',href:'forum-pages/forum-tchat.html'},
  ];
  const sg = document.getElementById('sectionsGrid');
  sections.forEach(s=>{
    sg.innerHTML+=`<a href="${s.href}" class="card-compact flex items-center gap-4 group cursor-pointer">
      <div class="w-10 h-10 rounded-lg flex items-center justify-center flex-shrink-0" style="background:rgba(255,45,85,.1)">
        <i class="fa-solid ${s.icon} text-red-400 group-hover:scale-110 transition-transform"></i>
      </div>
      <div class="flex-1 min-w-0">
        <div class="font-semibold text-sm group-hover:text-red-400 transition">${s.label}</div>
        <div class="mono text-xs text-zinc-600">${s.desc} · ${s.posts} posts</div>
      </div>
      <span class="badge ${s.tagClass} flex-shrink-0">${s.tag}</span>
    </a>`;
  });

  // Posts
  let allPosts=[
    {title:'Reverse Engineering 101 — Ghidra',author:'0xVoid',date:'il y a 1h',replies:34,views:240,tag:'Sécu',tagClass:'badge-red',hot:true,section:'Général'},
    {title:'SQL Injection Union-Based — guide complet 2026',author:'PhantomByte',date:'il y a 3h',replies:12,views:98,tag:'Web',tagClass:'badge-purple',hot:false,section:'Général'},
    {title:'Stack Tor + VPN + Tails — anonymat maximal',author:'GhostNet',date:'il y a 6h',replies:22,views:175,tag:'Anon',tagClass:'badge-green',hot:true,section:'Aide'},
    {title:'[Demande] Crack Adobe Suite 2026',author:'NewUser99',date:'il y a 8h',replies:5,views:43,tag:'Demande',tagClass:'badge-amber',hot:false,section:'Demandes'},
    {title:'Aircrack-ng WPA3 — encore possible en 2026 ?',author:'DarkCracker',date:'il y a 11h',replies:7,views:56,tag:'WiFi',tagClass:'badge-amber',hot:false,section:'Général'},
    {title:'Présentation — nouveau membre NullByte',author:'NullByte',date:'hier',replies:9,views:32,tag:'Présentation',tagClass:'badge-zinc',hot:false,section:'Présentations'},
    {title:'[Mirror] Liste torrents VPN outils pentest',author:'WarezKing',date:'hier',replies:2,views:87,tag:'Mirror',tagClass:'badge-green',hot:false,section:'Mirrors'},
    {title:'Analyse malware Redline Stealer 2026',author:'0xVoid',date:'il y a 2j',replies:19,views:312,tag:'Malware',tagClass:'badge-red',hot:true,section:'Général'},
  ];

  function renderPosts(posts){
    const c = document.getElementById('postsContainer');
    c.innerHTML = posts.length ? '' : '<div class="text-zinc-600 mono text-xs py-6 text-center">Aucun sujet trouvé.</div>';
    posts.forEach(p=>{
      c.innerHTML+=`<div class="forum-post p-4 flex items-center gap-4 cursor-pointer" onclick="location.href='forum-pages/forum-general.html'">
        <div class="flex-1 min-w-0">
          <div class="font-medium text-sm line-clamp-1">${p.title}</div>
          <div class="mono text-xs text-zinc-600 mt-0.5">par ${p.author} · ${p.date} · ${p.section}</div>
        </div>
        <div class="flex items-center gap-3 flex-shrink-0">
          <span class="mono text-xs text-zinc-600 hidden sm:block"><i class="fa-regular fa-comments mr-1"></i>${p.replies}</span>
          <span class="mono text-xs text-zinc-600 hidden sm:block"><i class="fa-regular fa-eye mr-1"></i>${p.views}</span>
          ${p.hot ? '<span class="text-xs">🔥</span>' : ''}
          <span class="badge ${p.tagClass}">${p.tag}</span>
        </div>
      </div>`;
    });
  }

  renderPosts(allPosts);

  function filterTab(tab, btn){
    document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const q = document.getElementById('searchInput').value.toLowerCase();
    let filtered = allPosts.filter(p=>!q || p.title.toLowerCase().includes(q));
    if(tab==='hot') filtered = filtered.filter(p=>p.hot);
    if(tab==='new') filtered = [...filtered].slice(0,4);
    renderPosts(filtered);
  }

  function filterPosts(){
    const q = document.getElementById('searchInput').value.toLowerCase();
    renderPosts(q ? allPosts.filter(p=>p.title.toLowerCase().includes(q)) : allPosts);
  }

  function showNewTopicModal(){ document.getElementById('newTopicModal').classList.remove('hidden'); }
  function closeModal(){ document.getElementById('newTopicModal').classList.add('hidden'); }

  function postTopic(){
    const title = document.getElementById('newTopicTitle').value.trim();
    if(!title) return;
    const newPost = {title,author:uname,date:'à l\'instant',replies:0,views:1,tag:'New',tagClass:'badge-green',hot:false,section:'Général'};
    allPosts.unshift(newPost);
    renderPosts(allPosts);
    closeModal();
    document.getElementById('newTopicTitle').value='';
    document.getElementById('newTopicBody').value='';
  }

  document.getElementById('newTopicModal').addEventListener('click',e=>{if(e.target===document.getElementById('newTopicModal'))closeModal();});
</script>
</body>
</html>
