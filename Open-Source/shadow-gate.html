<!DOCTYPE html>
<html lang="fr" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShadowHub // Authentification Niveau 2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@700;800&display=swap');

    :root {
      --red: #ff2d55;
      --green: #00ff88;
    }

    body {
      background: #020204;
      font-family: 'JetBrains Mono', monospace;
      color: #e4e4e7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .scanlines {
      pointer-events: none;
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, .1) 2px, rgba(0, 0, 0, .1) 4px);
      z-index: 999;
    }

    .vignette {
      pointer-events: none;
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0, 0, 0, .7) 100%);
      z-index: 998;
    }

    .panel {
      background: #060608;
      border: 1px solid #1a0505;
      border-radius: 10px;
      max-width: 460px;
      width: 100%;
    }

    .inp {
      width: 100%;
      background: #020204;
      border: 1px solid #1a0505;
      border-radius: 6px;
      padding: 11px 14px;
      color: var(--green);
      font-family: 'JetBrains Mono', monospace;
      font-size: .85rem;
      outline: none;
      letter-spacing: .15em;
      transition: border-color .2s;
      text-align: center;
    }

    .inp:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 2px rgba(255, 45, 85, .15);
    }

    .inp::placeholder {
      color: #1a1a1a;
      letter-spacing: .1em;
    }

    .btn {
      width: 100%;
      background: linear-gradient(135deg, #6b0000, var(--red));
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      border-radius: 6px;
      padding: 12px;
      border: none;
      cursor: pointer;
      transition: all .2s;
      letter-spacing: .12em;
      font-size: .75rem;
      text-transform: uppercase;
    }

    .btn:hover {
      box-shadow: 0 0 28px rgba(255, 45, 85, .5);
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: .4;
      cursor: not-allowed;
      transform: none;
    }

    .digit-box {
      display: inline-block;
      width: 44px;
      height: 52px;
      background: #0a0002;
      border: 1px solid #2a0a0a;
      border-radius: 6px;
      line-height: 52px;
      text-align: center;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--red);
      transition: all .2s;
    }

    .digit-box.filled {
      border-color: var(--red);
      box-shadow: 0 0 12px rgba(255, 45, 85, .3);
    }

    .err {
      color: var(--red);
      font-size: .7rem;
      text-align: center;
      margin-top: 10px;
      letter-spacing: .08em;
      min-height: 18px;
    }

    .success-msg {
      color: var(--green);
      font-size: .7rem;
      text-align: center;
      letter-spacing: .08em;
    }

    @keyframes flk {

      0%,
      97% {
        opacity: 1
      }

      97.5% {
        opacity: 0
      }

      98% {
        opacity: .4
      }

      98.5% {
        opacity: 1
      }
    }

    .flicker {
      animation: flk 5s infinite;
    }

    @keyframes pulse-red {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(255, 45, 85, .4)
      }

      50% {
        box-shadow: 0 0 0 6px rgba(255, 45, 85, 0)
      }
    }

    .skull-pulse i {
      animation: pulse-red 2s infinite;
    }
  </style>
</head>

<body>
  <div class="scanlines"></div>
  <div class="vignette"></div>

  <!-- Skull header -->
  <div class="skull-pulse mb-8 text-center">
    <i class="fa-solid fa-skull-crossbones text-5xl mb-3 block"
      style="color:var(--red);filter:drop-shadow(0 0 16px var(--red))"></i>
    <div class="text-xs text-zinc-700 tracking-widest">ZONE RESTREINTE</div>
  </div>

  <div class="panel p-8 flicker">
    <!-- Header panel -->
    <div class="text-center mb-8">
      <div class="text-xs text-zinc-700 mb-1 tracking-widest">AUTHENTIFICATION NIVEAU 2</div>
      <h1 class="text-2xl font-black tracking-tight" style="font-family:'Space Grotesk',sans-serif;color:var(--red)">
        SHADOW<span class="text-white">GATE</span></h1>
      <div class="text-xs text-zinc-600 mt-1">Code OTP requis pour accéder à la zone Shadow</div>
    </div>

    <!-- OTP display boxes -->
    <div id="digitDisplay" class="flex justify-center gap-2 mb-6">
      <div class="digit-box" id="d0">—</div>
      <div class="digit-box" id="d1">—</div>
      <div class="digit-box" id="d2">—</div>
      <div class="digit-box" id="d3">—</div>
      <div class="digit-box" id="d4">—</div>
      <div class="digit-box" id="d5">—</div>
    </div>

    <!-- Input caché -->
    <input id="otpInput" class="inp mb-4" type="text" inputmode="numeric" maxlength="6" placeholder="● ● ● ● ● ●"
      autocomplete="one-time-code" />

    <button id="verifyBtn" class="btn" disabled><i class="fa-solid fa-shield-halved mr-2"></i>Vérifier le code</button>
    <div id="errMsg" class="err"></div>

    <!-- Info bar -->
    <div class="mt-8 pt-6 border-t border-zinc-900 space-y-2 text-zinc-700 text-xs">
      <div class="flex items-center gap-2"><i class="fa-solid fa-circle-info text-zinc-800"></i>Code de démo : <span
          class="text-zinc-500 font-bold tracking-widest">123456</span></div>
      <div class="flex items-center gap-2"><i class="fa-solid fa-lock text-zinc-800"></i>Session chiffrée · expiration
        15 min</div>
      <div class="flex items-center gap-2"><i class="fa-solid fa-eye-slash text-zinc-800"></i>Aucun log conservé</div>
    </div>
  </div>

  <!-- Back link -->
  <div class="mt-6 text-xs text-zinc-700 hover:text-zinc-500 transition cursor-pointer"
    onclick="location.href='cyberhub.html'">
    <i class="fa-solid fa-arrow-left mr-2"></i>Retour surface >>| cyberhub.html
  </div>

  <script>
    if (!localStorage.getItem('cyberhub_user')) window.location.href = 'login.html';

    const input = document.getElementById('otpInput');
    const btn = document.getElementById('verifyBtn');
    const err = document.getElementById('errMsg');
    const boxes = [0, 1, 2, 3, 4, 5].map(i => document.getElementById('d' + i));

    input.addEventListener('input', () => {
      const v = input.value.replace(/\D/g, '').slice(0, 6);
      input.value = v;
      boxes.forEach((b, i) => {
        b.textContent = v[i] || '—';
        b.classList.toggle('filled', !!v[i]);
      });
      btn.disabled = v.length < 6;
      err.textContent = '';
    });

    let attempts = 0;
    btn.addEventListener('click', () => {
      const code = input.value.replace(/\D/g, '');
      if (code === '123456') {
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>Accès autorisé...';
        btn.style.background = 'linear-gradient(135deg,#064e3b,#059669)';
        err.style.color = 'var(--green)';
        err.textContent = '✓ IDENTITÉ CONFIRMÉE — REDIRECTION EN COURS';
        localStorage.setItem('shadow_authenticated', 'true');
        setTimeout(() => window.location.href = 'shadow/forum.html', 1200);
      } else {
        attempts++;
        err.textContent = attempts >= 3 ? '⚠ TROP DE TENTATIVES — ESSAYEZ 123456' : '✗ CODE INVALIDE — ' + (3 - attempts) + ' tentative(s) restante(s)';
        boxes.forEach(b => { b.style.borderColor = 'var(--red)'; setTimeout(() => b.style.borderColor = '', 600); });
        input.value = '';
        boxes.forEach(b => { b.textContent = '—'; b.classList.remove('filled'); });
        btn.disabled = true;
      }
    });

    input.addEventListener('keydown', e => { if (e.key === 'Enter' && !btn.disabled) btn.click(); });
    input.focus();
  </script>
</body>

</html>
